<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Theme Songs</title>
</head>
<body>
    <div id="ThemeSongsConfigPage"
         data-role="page"
         class="page type-interior pluginConfigurationPage"
         data-require="emby-button">
        <div data-role="content">
            <div class="content-primary">
                <div class="sectionTitleContainer flex align-items-center">
                    <h2 class="sectionTitle">Theme Songs</h2>
                </div>

                <div class="verticalSection">
                    <p>This plugin is in active development. Bugs are likely to occur.</p>
                </div>

                <button is="emby-button" type="button" class="raised block" id="scan-download" onclick="download()">
                    <span>Download Theme Songs</span>
                </button>
            </div>
        </div>

        <script type="text/javascript">
            function download() {
                var btn = document.getElementById('scan-download');
                if (btn) btn.disabled = true;

                ApiClient.fetch({
                    url: ApiClient.getUrl('/plugins/theme-songs/scan-download'),
                    type: 'POST'
                }).then(function () {
                    Dashboard.alert('Downloading Theme Songs...');
                }).catch(function () {
                    Dashboard.alert({ message: 'Unexpected error occurred!' });
                }).finally(function () {
                    if (btn) btn.disabled = false;
                });
            }
        </script>

    </div>
</body>
</html>
